# https://taskfile.dev
# Python Development Tasks

version: "3"

tasks:
  format:
    desc: Format Python code using ruff
    cmds:
      - uv run ruff format

  lint:
    desc: Lint Python code and output to diagnostics
    cmds:
      - uv run ruff check

  type-check:
    desc: Run type checking with pyright
    cmds:
      - uv run pyright

  sync-dependencies:
    desc: Sync dependencies with uv
    cmds:
      - uv sync

  build-package:
    desc: Build the Python package with uv
    cmds:
      - uv build

  unit-tests:
    desc: Run unit tests with pytest
    cmds:
      - uv run pytest tests/unit_tests -v
