# https://taskfile.dev

version: "3"

includes:
  python: ./tasks/python.yaml
  linters: ./tasks/lint.yaml
  integration-tests: ./tasks/integration-tests.yaml
  nix: ./tasks/nix.yaml

tasks:
  # ============================================================
  # Combined Tasks
  # ============================================================

  test:
    desc: Run all tests (unit and integration)
    cmds:
      - task: python:unit-tests
      - task: integration-tests:all

  ci:
    desc: Run full CI pipeline (lint, type-check, tests)
    cmds:
      - task: python:lint
      - task: python:type-check
      - task: python:unit-tests
      - task: integration-tests:all

  clean:
    desc: Clean all generated artifacts
    cmds:
      - rm -rf {{.DIAGNOSTICS_DIR}}
      - rm -rf dist
      - rm -rf cache
      - task: integration-tests:clean
