name: Integration Tests

on:
  pull_request:
    types: [labeled]

jobs:
  integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    if: github.event.label.name == 'run-integration-tests'

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Remove label (re-arm the trigger)
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: 'run-integration-tests'
            });

      - name: Setup Docker
        uses: docker/setup-docker-action@v4

      - name: Verify Docker
        run: |
          docker --version
          docker compose version

      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0

      - name: Sync dependencies
        run: devbox run -- task sync-dependencies

      - name: Run integration tests
        run: devbox run -- task integration-tests