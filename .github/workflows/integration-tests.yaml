name: Integration Tests

on:
  workflow_dispatch:
  pull_request:
    types: [labeled]

env:
  TRIGGER_LABEL: "run-integration-tests"

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  run-integration-tests:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == env.TRIGGER_LABEL
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Remove label (re-arm the trigger)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: process.env.TRIGGER_LABEL
            });

      - name: Setup Docker
        uses: docker/setup-docker-action@v4

      - name: Verify Docker
        run: |
          docker --version
          docker compose version

      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0

      - name: Sync dependencies
        run: devbox run -- task sync-dependencies

      - name: Run integration tests
        run: devbox run -- task integration-tests

      - name: Post result comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const passed = '${{ job.status }}' === 'success';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: passed
                ? '✅ Integration tests passed!'
                : '❌ Integration tests failed. See the [run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).'
            });
